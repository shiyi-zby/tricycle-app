name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y openjdk-11-jdk zip unzip
        pip install buildozer cython
    
    - name: Build APK
      run: |
        buildozer init
        sed -i 's/package.name = myapp/package.name = tricycleapp/' buildozer.spec
        sed -i 's/package.domain = org.test/package.domain = org.tricycle/' buildozer.spec
        sed -i 's/requirements = python3,kivy/requirements = python3,kivy==2.1.0,kivymd==1.1.1,pandas,openpyxl/' buildozer.spec
        sed -i 's/orientation = landscape/orientation = portrait/' buildozer.spec
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: tricycle-apk
        path: bin/*.apk
