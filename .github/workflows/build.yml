name: Build Kivy APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_apk:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 配置 Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: 设置JDK17（必须固定，避免系统多JDK冲突）
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 替换清华Ubuntu源
        run: |
          sudo cp /etc/apt/sources.list /etc/apt/sources.list.bak
          sudo tee /etc/apt/sources.list <<'EOF'
          deb https://mirrors.tuna.tsinghua.edu.cn/ubuntu/ jammy main restricted universe multiverse
          deb https://mirrors.tuna.tsinghua.edu.cn/ubuntu/ jammy-updates main restricted universe multiverse
          deb https://mirrors.tuna.tsinghua.edu.cn/ubuntu/ jammy-backports main restricted universe multiverse
          deb https://mirrors.tuna.tsinghua.edu.cn/ubuntu/ jammy-security main restricted universe multiverse
          EOF
          sudo apt update

      - name: 安装系统依赖
        run: |
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev automake
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip install buildozer

      - name: Git镜像加速
        run: |
          git config --global url."https://gitee.com/mirrors/".insteadOf "https://github.com/"
          git config --global url."https://gitee.com/mirrors/".insteadOf "git@github.com:"

      - name: 彻底删除所有旧打包缓存（关键解决clean报错）
        run: |
          rm -rf .buildozer
          mkdir -p .buildozer

      - name: 自动同意SDK协议打包
        run: |
          yes | buildozer -v android debug

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: APK安装包
          path: bin/*.apk
